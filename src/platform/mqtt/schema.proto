syntax = "proto3";
package spog;

message ParamValue {
  oneof value {
    double number_value = 1;
    string string_value = 2;
    bool bool_value = 3;
  }
}

message ValueMsg {
  ParamValue value = 1;
  double ts = 2;
  string full_id = 3;
}

message PresenceMsg {
  bool active = 1;
  string full_id = 2;
  double ts = 3;
}

message RateMsg {
  int32 messagesPerMinute = 1;
  double ts = 2;
  string full_id = 3;
}

message PayloadWrapper {
  oneof payload {
    ValueMsg value_msg = 1;
    PresenceMsg presence_msg = 2;
    RateMsg rate_msg = 3;
    string json_fallback = 4;
  }
}
